name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FOUNDRY_PROFILE: default

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      # Pinned to the exact commits the source compiles against. DO NOT float these:
      #  - v4-periphery main DELETED BaseHook (PR #510); 3779387 is the last commit that has it.
      #  - v4-core 59d3ecf is the matching commit (has types/PoolOperation.sol).
      #  - DN404 lives in Vectorized/dn404 (it was removed from Solady).
      # forge 1.x installs recursively (v4-core/v4-periphery bring solmate/oz/permit2 as submodules)
      # and no longer commits by default, so `--no-commit` is gone.
      - name: Install dependencies (pinned)
        run: |
          forge install foundry-rs/forge-std@620536fa5277db4e3fd46772d5cbc1ea0696fb43
          forge install Uniswap/v4-core@59d3ecf53afa9264a16bba0e38f4c5d2231f80bc
          forge install Uniswap/v4-periphery@3779387e5d296f39df543d23524b050f89a62917
          forge install Vectorized/solady@acd959aa4bd04720d640bf4e6a5c71037510cc4b
          forge install Vectorized/dn404@3397cb11558ac853912ee87871422b6a29c9d346

      - name: Show forge version
        run: forge --version

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv
